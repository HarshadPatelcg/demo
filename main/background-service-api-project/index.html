
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Currency Converter – Simple JS (Split Files)</title>
  <link rel="preconnect" href="https://api.frankfurter.app" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:2rem}
    h1{margin:0 0 1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;max-width:760px}
    label{display:block;margin:.25rem 0;font-weight:600}
    input,select,button{width:100%;padding:.55rem;font-size:1rem}
    .card{border:1px solid #ddd;border-radius:10px;padding:1rem;max-width:800px}
    pre{background:#f7f7f7;padding:1rem;border-radius:8px;overflow:auto}
    footer{margin-top:2rem;color:#666}
  </style>
</head>
<body>
  <h1>Currency Converter – Simple JS</h1>
  <p>Pure HTML + JavaScript using the open-source <a href="https://www.frankfurter.app/">Frankfurter</a> API (ECB rates). No Node, no build. Run locally.</p>

  <div class="card">
    <div class="grid">
      <div>
        <label for="from">From currency</label>
        <input id="from" value="USD" />
      </div>
      <div>
        <label for="to">To currency</label>
        <input id="to" value="INR" />
      </div>
      <div>
        <label for="amount">Amount</label>
        <input id="amount" type="number" value="100" min="0" step="0.01" />
      </div>
    </div>
    <p style="margin-top:1rem"><button id="convertBtn">Convert</button></p>
    <pre id="output">Ready.</pre>
  </div>

  <footer>
    <small>Data source: Frankfurter (ECB). Some currency pairs may be unavailable. No API key required.</small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
